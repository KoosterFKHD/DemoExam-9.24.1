<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход для администратора</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .admin-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .sub {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        button:hover {
            background: #2563eb;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
        }
        .back-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="admin-icon">👨‍💼</div>
    <h1>Панель администратора</h1>
    <div class="sub">Введите учетные данные для входа</div>
    
    <form id="adminLoginForm">
        <label>Логин:</label>
        <input type="text" id="login" placeholder="Admin26" required>
        
        <label>Пароль:</label>
        <input type="password" id="password" placeholder="••••••" required>
        
        <button type="submit">Войти в панель управления</button>
    </form>
    
    <div id="message"></div>
    <a href="login.html" class="back-link">← Назад к пользовательскому входу</a>
</div>

<script>
    const form = document.getElementById('adminLoginForm');
    const msgDiv = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                localStorage.setItem('adminToken', JSON.stringify({
                    login: data.admin.login,
                    role: data.admin.role,
                    loggedInAt: new Date().toISOString()
                }));
                msgDiv.className = 'message';
                msgDiv.textContent = '';
                window.location.href = 'admin.html';
            } else {
                msgDiv.className = 'message error';
                msgDiv.textContent = data.error || 'Неверный логин или пароль';
            }
        } catch (error) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Ошибка соединения с сервером';
        }
    });
</script>
</body>
</html>
