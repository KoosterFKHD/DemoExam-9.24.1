<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { margin-bottom: 0.5rem; }
        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background: #2563eb; }
        .message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        .error { background: #fee2e2; color: #991b1b; }
        .success { background: #dcfce7; color: #166534; }
        a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Вход</h1>
    <form id="loginForm">
        <label>Email или логин:</label>
        <input type="text" id="login" required>
        
        <label>Пароль:</label>
        <input type="password" id="password" required>
        
        <button type="submit">Войти</button>
    </form>
    <div id="message"></div>
    <p style="margin-top: 1rem; text-align: center;">
        Нет аккаунта? <a href="register.html">Регистрация</a>
    </p>
</div>

<script>
    const form = document.getElementById('loginForm');
    const msgDiv = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                msgDiv.className = 'message success';
                msgDiv.textContent = 'Вход выполнен! Перенаправление...';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                msgDiv.className = 'message error';
                msgDiv.textContent = data.error || 'Ошибка входа';
            }
        } catch (error) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Ошибка соединения с сервером';
        }
    });
</script>
</body>
</html>
