<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { margin-bottom: 0.5rem; color: #1e293b; }
        .sub { color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: system-ui;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        button:hover { background: #2563eb; }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            text-align: center;
        }
        .error { background: #fee2e2; color: #991b1b; }
        .success { background: #dcfce7; color: #166534; }
        a { color: #3b82f6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .form-row {
            margin-bottom: 0.5rem;
        }
        label {
            font-weight: 500;
            color: #334155;
            font-size: 0.9rem;
        }
        .required::after {
            content: " *";
            color: #ef4444;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Создать аккаунт</h1>
    <div class="sub">Заполните все поля для регистрации</div>
    
    <form id="registerForm">
        <div class="form-row">
            <label class="required">ФИО</label>
            <input type="text" id="fullname" placeholder="Иванов Иван Иванович" required>
        </div>
        
        <div class="form-row">
            <label class="required">Имя пользователя (логин)</label>
            <input type="text" id="username" placeholder="ivan_2024" required>
        </div>
        
        <div class="form-row">
            <label class="required">Email</label>
            <input type="email" id="email" placeholder="ivan@example.com" required>
        </div>
        
        <div class="form-row">
            <label class="required">Номер телефона</label>
            <input type="tel" id="phone" placeholder="+7 (999) 123-45-67" required>
        </div>
        
        <div class="form-row">
            <label class="required">Дата рождения</label>
            <input type="date" id="birthdate" required>
        </div>
        
        <div class="form-row">
            <label class="required">Пароль (минимум 6 символов)</label>
            <input type="password" id="password" placeholder="••••••" required>
        </div>
        
        <div class="form-row">
            <label>Подтверждение пароля</label>
            <input type="password" id="confirmPassword" placeholder="••••••">
        </div>
        
        <button type="submit">Зарегистрироваться</button>
    </form>
    
    <div id="message"></div>
    
    <p style="margin-top: 1.5rem; text-align: center;">
        Уже есть аккаунт? <a href="login.html">Войти</a>
    </p>
</div>

<script>
    const form = document.getElementById('registerForm');
    const msgDiv = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fullname = document.getElementById('fullname').value.trim();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const birthdate = document.getElementById('birthdate').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        // Валидация
        if (!fullname || !username || !email || !phone || !birthdate || !password) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Заполните все обязательные поля';
            return;
        }
        
        if (password.length < 6) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Пароль должен быть минимум 6 символов';
            return;
        }
        
        if (password !== confirmPassword) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Пароли не совпадают';
            return;
        }
        
        if (!email.includes('@') || !email.includes('.')) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Введите корректный email';
            return;
        }
        
        if (phone.length < 10) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Введите корректный номер телефона';
            return;
        }
        
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    fullname, 
                    username, 
                    email, 
                    phone, 
                    birthdate, 
                    password 
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                msgDiv.className = 'message success';
                msgDiv.textContent = '✅ Регистрация успешна! Перенаправление на вход...';
                
                // Очищаем форму
                form.reset();
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                msgDiv.className = 'message error';
                msgDiv.textContent = data.error || 'Ошибка регистрации';
            }
        } catch (error) {
            msgDiv.className = 'message error';
            msgDiv.textContent = 'Ошибка соединения с сервером';
        }
    });
</script>
</body>
</html>
